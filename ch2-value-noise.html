<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLSL Playground</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --border:   #2a2d3a;
    --text:     #c9d1d9;
    --muted:    #6e7681;
    --accent:   #58a6ff;
    --error:    #f85149;
    --success:  #3fb950;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --font-ui:   system-ui, -apple-system, sans-serif;
    --radius:    6px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  #app {
    display: grid;
    grid-template-rows: 40px 1fr 28px;
    height: 100vh;
  }

  /* ── TOOLBAR ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    user-select: none;
  }

  #title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .05em;
    text-transform: uppercase;
    flex: 1;
  }

  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .btn {
    font-size: 12px;
    font-family: var(--font-ui);
    font-weight: 500;
    padding: 4px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .btn:hover { background: rgba(255,255,255,.06); }

  .btn-run {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d1117;
    font-weight: 600;
  }
  .btn-run:hover { background: #79b8ff; border-color: #79b8ff; }

  /* ── MAIN SPLIT ── */
  #main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
  }

  /* ── EDITOR SIDE ── */
  #editor-panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }

  #editor-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  #dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  #dot.ok  { background: var(--success); }
  #dot.err { background: var(--error);   }

  #editor {
    flex: 1;
    width: 100%;
    padding: 14px 16px;
    font-size: 12.5px;
    font-family: var(--font-mono);
    line-height: 1.65;
    color: var(--text);
    background: var(--bg);
    border: none;
    outline: none;
    resize: none;
    tab-size: 4;
    caret-color: var(--accent);
  }

  /* uniform hint overlay */
  #uniforms-hint {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 6px 14px;
    font-size: 10.5px;
    font-family: var(--font-mono);
    color: var(--muted);
    background: linear-gradient(transparent, var(--bg) 40%);
    pointer-events: none;
  }

  /* ── PREVIEW SIDE ── */
  #preview-panel {
    position: relative;
    background: #000;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.7);
    font-size: 13px;
    font-family: var(--font-mono);
    color: var(--error);
    padding: 24px;
    text-align: center;
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.6;
    pointer-events: none;
    opacity: 0;
    transition: opacity .2s;
  }
  #overlay.show { opacity: 1; }

  #fps {
    position: absolute;
    top: 10px; right: 12px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: rgba(255,255,255,.3);
    pointer-events: none;
  }

  #pause-btn {
    position: absolute;
    bottom: 10px; right: 10px;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.2);
    background: rgba(0,0,0,.5);
    color: rgba(255,255,255,.7);
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  #pause-btn:hover { background: rgba(0,0,0,.8); }

  /* ── STATUSBAR ── */
  #statusbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--muted);
    overflow: hidden;
  }
  #status-msg { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #status-msg.err { color: var(--error); }
  #status-msg.ok  { color: var(--success); }
  #time-display { flex-shrink: 0; }
</style>
</head>
<body>
<div id="app">

  <!-- TOOLBAR -->
  <div id="toolbar">
    <span id="title">GLSL Playground</span>
    <span class="tag">fragment</span>
    <button class="btn" id="btn-reset">Reset</button>
    <button class="btn" id="btn-copy">Copy GLSL</button>
    <button class="btn btn-run" id="btn-run">▶ Run  <kbd style="font-size:10px;opacity:.7">Ctrl+↵</kbd></button>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- EDITOR -->
    <div id="editor-panel">
      <div id="editor-header">
        <div id="dot"></div>
        <span id="compile-status">ready</span>
      </div>
      <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
      <div id="uniforms-hint">
        uniforms: <span style="color:#79b8ff">iTime</span> · <span style="color:#79b8ff">iResolution</span> · <span style="color:#79b8ff">iMouse</span>
      </div>
    </div>

    <!-- PREVIEW -->
    <div id="preview-panel">
      <canvas id="glcanvas"></canvas>
      <div id="fps">-- fps</div>
      <div id="overlay"></div>
      <button id="pause-btn" title="Pause/Resume">⏸</button>
    </div>

  </div>

  <!-- STATUSBAR -->
  <div id="statusbar">
    <span id="status-msg">Nhấn ▶ Run hoặc Ctrl+Enter để compile</span>
    <span id="time-display">t = 0.000s</span>
  </div>

</div>

<script>
// ── DEFAULT SHADER ──────────────────────────────────────────────────────────
// Thay nội dung này cho từng chương
const DEFAULT_SHADER = `// Hàm hash đơn giản từ tọa độ 2D
float rand(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

// Hàm fade cubic (Perlin-style)
vec2 fade(vec2 t) {
    return t * t * (3.0 - 2.0 * t);
}

// Value Noise 2D
float valueNoise(vec2 p) {

// Lấy phần nguyên và thập phân
    vec2 i = floor(p);
    vec2 f = fract(p);

// Lấy giá trị random tại 4 góc
    float a = rand(i);
    float b = rand(i + vec2(1.0, 0.0));
    float c = rand(i + vec2(0.0, 1.0));
    float d = rand(i + vec2(1.0, 1.0));
    
// Làm mượt hệ số nội suy
    vec2 u = fade(f);
    
// Bilinear interpolation
    return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
}

void mainImage(out vec4 fragColor, in vec2 fragCoord) {
    vec2 uv = fragCoord.xy / iResolution.xy;

    float scale = 10.0;
    float noise = valueNoise(uv * scale);

    fragColor = vec4(vec3(noise), 1.0);
}`;

// ── WEBGL BOOTSTRAP ─────────────────────────────────────────────────────────
const VS_SRC = `attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }`;

function wrapFS(userSrc) {
  return `precision highp float;
uniform float     iTime;
uniform vec2      iResolution;
uniform vec2      iMouse;
${userSrc}
void main() { mainImage(gl_FragColor, gl_FragCoord.xy); }`;
}

const canvas  = document.getElementById('glcanvas');
const editor  = document.getElementById('editor');
const overlay = document.getElementById('overlay');
const dot     = document.getElementById('dot');
const cStatus = document.getElementById('compile-status');
const statusEl= document.getElementById('status-msg');
const fpsEl   = document.getElementById('fps');
const timeEl  = document.getElementById('time-display');
const pauseBtn= document.getElementById('pause-btn');

const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
if (!gl) { statusEl.textContent = 'WebGL not supported'; statusEl.className = 'err'; }

editor.value = DEFAULT_SHADER;

let prog = null, animId = null;
let startTime = performance.now(), pausedAt = 0, paused = false;
let mouseX = 0, mouseY = 0;
let fpsFrames = 0, fpsLast = 0;

// track mouse
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const dpr = devicePixelRatio || 1;
  mouseX = (e.clientX - r.left) * dpr;
  mouseY = canvas.height - (e.clientY - r.top) * dpr;
});

// ── COMPILER ────────────────────────────────────────────────────────────────
function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    const log = gl.getShaderInfoLog(s);
    gl.deleteShader(s);
    throw log;
  }
  return s;
}

function buildProgram(fsSrc) {
  const vs = compileShader(gl.VERTEX_SHADER, VS_SRC);
  const fs = compileShader(gl.FRAGMENT_SHADER, wrapFS(fsSrc));
  const p  = gl.createProgram();
  gl.attachShader(p, vs); gl.attachShader(p, fs);
  gl.linkProgram(p);
  gl.deleteShader(vs); gl.deleteShader(fs);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw gl.getProgramInfoLog(p);
  return p;
}

function initQuad(p) {
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(p, 'a_pos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
}

// ── RESIZE ──────────────────────────────────────────────────────────────────
function resize() {
  const dpr = devicePixelRatio || 1;
  const r   = canvas.getBoundingClientRect();
  canvas.width  = (r.width  * dpr) | 0;
  canvas.height = (r.height * dpr) | 0;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', () => prog && resize());

// ── RUN SHADER ──────────────────────────────────────────────────────────────
function runShader(code) {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  overlay.classList.remove('show');

  try {
    if (prog) gl.deleteProgram(prog);
    prog = buildProgram(code);
    initQuad(prog);
    resize();
    startTime = performance.now() - pausedAt;
    paused = false;
    pauseBtn.textContent = '⏸';

    dot.className = 'ok';
    cStatus.textContent = 'compiled ok';
    setStatus('Compiled successfully', 'ok');
    loop();
  } catch (rawErr) {
    prog = null;
    // clean up error — strip wrapper line offset
    const cleaned = String(rawErr)
      .replace(/ERROR: \d+:(\d+):/g, (_, ln) => {
        const real = parseInt(ln) - 6; // offset from wrapFS header lines
        return `ERROR line ${real > 0 ? real : ln}:`;
      })
      .trim();

    dot.className = 'err';
    cStatus.textContent = 'compile error';
    setStatus(cleaned, 'err');
    overlay.textContent = cleaned;
    overlay.classList.add('show');
  }
}

// ── RENDER LOOP ─────────────────────────────────────────────────────────────
function loop() {
  animId = requestAnimationFrame(loop);
  if (!prog) return;

  const now = performance.now();
  const t   = (now - startTime) / 1000;

  // fps counter
  fpsFrames++;
  if (now - fpsLast > 1000) {
    fpsEl.textContent = fpsFrames + ' fps';
    fpsFrames = 0; fpsLast = now;
  }

  timeEl.textContent = 't = ' + t.toFixed(3) + 's';

  gl.useProgram(prog);
  gl.uniform1f(gl.getUniformLocation(prog, 'iTime'),       t);
  gl.uniform2f(gl.getUniformLocation(prog, 'iResolution'), canvas.width, canvas.height);
  gl.uniform2f(gl.getUniformLocation(prog, 'iMouse'),      mouseX, mouseY);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ── HELPERS ─────────────────────────────────────────────────────────────────
function setStatus(msg, cls = '') {
  statusEl.textContent = msg;
  statusEl.className = cls;
}

function togglePause() {
  if (!prog) return;
  paused = !paused;
  if (paused) {
    pausedAt = performance.now() - startTime;
    cancelAnimationFrame(animId); animId = null;
    pauseBtn.textContent = '▶';
    setStatus('Paused', '');
  } else {
    startTime = performance.now() - pausedAt;
    pauseBtn.textContent = '⏸';
    setStatus('Running', 'ok');
    loop();
  }
}

// ── CONTROLS ────────────────────────────────────────────────────────────────
document.getElementById('btn-run').onclick   = () => runShader(editor.value);
document.getElementById('btn-reset').onclick = () => { editor.value = DEFAULT_SHADER; runShader(DEFAULT_SHADER); };
document.getElementById('btn-copy').onclick  = () => {
  navigator.clipboard.writeText(editor.value).then(() => setStatus('Copied!', 'ok'));
};
pauseBtn.onclick = togglePause;

editor.addEventListener('keydown', e => {
  // Ctrl+Enter = run
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runShader(editor.value);
    return;
  }
  // Tab = 4 spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, en = editor.selectionEnd;
    editor.value = editor.value.slice(0, s) + '    ' + editor.value.slice(en);
    editor.selectionStart = editor.selectionEnd = s + 4;
  }
});

// auto-run on load
runShader(DEFAULT_SHADER);
</script>
</body>
</html>
